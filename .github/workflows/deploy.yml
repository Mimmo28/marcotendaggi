name: 🚀 Deploy Marco Tendaggi
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🏗️ Build & Sync
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🛠️ Install dependencies (reproducible)
        # npm ci: installa ESATTAMENTE le versioni in package-lock.json
        # Non altera mai il lock file — build deterministici e sicuri
        run: npm ci

      - name: 🔐 Security Audit (blocca solo High/Critical)
        # Blocca il deploy se ci sono vulnerabilità HIGH o CRITICAL
        # Le LOW vengono solo segnalate nel log senza bloccare
        run: npm run audit:ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 📂 Sync files to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: ./
          protocol: ftps
          # exclude: trasferisce solo i file cambiati (delta sync)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**